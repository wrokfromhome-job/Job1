<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>Redirecting...</title>

<script>
(function() {

  // Tere numbers
  var numbers = [
    "919731217883",
    "919731695706",
    "917406163067",
    "917406248809",
    "916002319152",
    "916009651527",
    "916002718250",
    "919731164906",
    "919731359746"
  ];

  // Random number pick
  var num = numbers[Math.floor(Math.random() * numbers.length)];

  // Message
  var msg = encodeURIComponent("Hello! Would you like to know more about our positions?");

  // WhatsApp link
  var url = "https://wa.me/" + num + "?text=" + msg;

  // Instant redirect (0ms)
  window.location.replace(url);

})();
</script>

</head>

</body>
</html>
