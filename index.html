<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script>
(function() {

  // 📞 Updated Numbers
  var numbers = [
    "916385919868",
    "917007712750",
    "917015956602",
    "917022843643",
    "917005013836",
    "917001989707",
    "916913142396",

    "919874960743",
    "916265058442"
  ];

  // 💬 Same Message
  var message = "Hello! Would you like to know more about our positions?";

  // 💾 Same number until data clear
  var savedNumber = localStorage.getItem("selectedNumber");

  if (!savedNumber) {
    savedNumber = numbers[Math.floor(Math.random() * numbers.length)];
    localStorage.setItem("selectedNumber", savedNumber);
  }

  // 🔗 WhatsApp URL
  var url = "https://wa.me/" + savedNumber + "?text=" + encodeURIComponent(message);

  // ⚡ Instant Redirect
  window.location.replace(url);

})();
