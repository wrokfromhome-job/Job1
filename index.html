<script>
// 1. Force Clear LocalStorage taaki naye version ka data ekdum fresh load ho
localStorage.clear(); 
console.log("LocalStorage completely cleared for Version 41.");

// 2. NEW CONTACTS DATA (Dono naye screenshots ke saare actual numbers aur unke sahi messages)
const contacts = [
  { number: "918882591048", message: "Hi" },
  { number: "919618828927", message: "Hi" },
  { number: "919384640494", message: "Hi" },
  { number: "918271460311", message: "Hey" },
  { number: "919912303137", message: "Hello" },
  { number: "917521986233", message: "Hi" },
  { number: "919641530646", message: "Heyy" },
  { number: "917082658763", message: "Hi" },
  { number: "918467002881", message: "Hi" }
];

// 3. NEW VERSION - Version ko v40 se badal kar v41 kar diya hai
const VERSION = "v41_" + location.hostname;

// Same visitor = same number logic (Sticky Visitor Logic)
let saved = localStorage.getItem(VERSION);

if (!saved) {
  // Agar is version ka data nahi hai, to list me se randomly ek number select hoga
  const random = contacts[Math.floor(Math.random() * contacts.length)];
  saved = JSON.stringify(random);
  localStorage.setItem(VERSION, saved);
}

const data = JSON.parse(saved);

// 4. WhatsApp API par automatic redirect karne ke liye
window.location.replace(
  `https://wa.me/${data.number}?text=${encodeURIComponent(data.message)}`
);
</script>
