<script>
localStorage.clear(); // clear old saved numbers

const contacts = [

  { number: "919861971066", message: "Hello! Would you like to know more about our positions?" },
  { number: "917793942365", message: "Hello! Would you like to know more about our positions?" },
  { number: "919661405777", message: "Hello! Would you like to know more about our positions?" },
  { number: "917014276303", message: "Hello! Would you like to know more about our positions?" },
  { number: "917801086710", message: "Hello! Would you like to know more about our positions?" },
  { number: "916374242007", message: "Hello! Would you like to know more about our positions?" },
  { number: "918098758825", message: "Hello! Would you like to know more about our positions?" },
  { number: "917896444853", message: "Hello! Would you like to know more about our positions?" },
  { number: "917416992335", message: "Hello! Would you like to know more about our positions?" },
  { number: "917490066858", message: "Hello! Would you like to know more about our positions?" }

];

// NEW VERSION
const VERSION = "v36_" + location.hostname;

// Same visitor = same number
let saved = localStorage.getItem(VERSION);

if (!saved) {
  const random = contacts[Math.floor(Math.random() * contacts.length)];
  saved = JSON.stringify(random);
  localStorage.setItem(VERSION, saved);
}

const data = JSON.parse(saved);

// Redirect
window.location.replace(
  `https://wa.me/${data.number}?text=${encodeURIComponent(data.message)}`
);
</script>
