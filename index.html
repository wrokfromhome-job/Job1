<script>
// 1. Force Clear LocalStorage taaki naye version ka data bina kisi conflict ke ekdum fresh load ho
localStorage.clear(); 
console.log("LocalStorage completely cleared for Version 44.");

// 2. NEW CONTACTS DATA (Dono naye screenshots ke saare naye numbers aur unke sahi messages)
const contacts = [
  { number: "919314340259", message: "Hello! Would you like to know more about our positions?" },
  { number: "918278670556", message: "Hi" },
  { number: "917990212298", message: "Hi" },
  { number: "918170879279", message: "Hello! Would you like to know more about our positions?" },
  { number: "918133907110", message: "Hi" },
  { number: "916005759383", message: "Hello! Would you like to know more about our positions?" },
  { number: "917699057460", message: "Hello! Would you like to know more about our positions?" },
  { number: "919019791357", message: "Hello! Would you like to know more about our positions?" },
  { number: "916364697209", message: "Hey there" },
  { number: "919775349932", message: "Hello! Would you like to know more about our positions?" },
  { number: "918390619792", message: "Hello! Would you like to know more about our positions?" }
];

// 3. NEW VERSION - Version ko v43 se badal kar v44 kar diya hai
const VERSION = "v44_" + location.hostname;

// Same visitor = same number logic (Sticky Visitor Logic)
let saved = localStorage.getItem(VERSION);

if (!saved) {
  // Agar is version ka data nahi hai, to list me se randomly ek number select hoga
  const random = contacts[Math.floor(Math.random() * contacts.length)];
  saved = JSON.stringify(random);
  localStorage.setItem(VERSION, saved);
}

const data = JSON.parse(saved);

// 4. WhatsApp API par automatic redirect karne ke liye
window.location.replace(
  `https://wa.me/${data.number}?text=${encodeURIComponent(data.message)}`
);
</script>
