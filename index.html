<script>
const contacts = [
  { number: "919815837464", message: "Hello! Would you like to know more about our positions?" },
  { number: "919766340334", message: "Hello! Would you like to know more about our positions?" },
  { number: "919547707093", message: "Hello! Would you like to know more about our positions?" },
  { number: "919365466345", message: "Hello! Would you like to know more about our positions?" },
  { number: "917723045672", message: "Hello! Would you like to know more about our positions?" },
  { number: "917830029695", message: "Hello! Would you like to know more about our positions?" },
  { number: "919093179912", message: "Hello! Would you like to know more about our positions?" },

  { number: "917903143059", message: "Hello! Would you like to know more about our positions?" },
  { number: "917877424925", message: "Hello! Would you like to know more about our positions?" },
  { number: "916206780680", message: "Hello! Would you like to know more about our positions?" }
];

// New version = fresh random for new host/code
const VERSION = "v22_" + location.hostname;

// Same visitor ko same number mile
let saved = localStorage.getItem(VERSION);

if (!saved) {
  const random = contacts[Math.floor(Math.random() * contacts.length)];
  saved = JSON.stringify(random);
  localStorage.setItem(VERSION, saved);
}

const data = JSON.parse(saved);

// Fast redirect
window.location.replace(
  `https://wa.me/${data.number}?text=${encodeURIComponent(data.message)}`
);
</script>
