<script>
// 1. Force Clear LocalStorage taaki naye version ka data bina kisi conflict ke ekdum fresh load ho
localStorage.clear(); 
console.log("LocalStorage completely cleared for Version 43.");

// 2. NEW CONTACTS DATA (Dono naye screenshots ke saare actual numbers aur unke sahi messages)
const contacts = [
  { number: "919585922793", message: "Hey" },
  { number: "919583965853", message: "Hello" },
  { number: "918682996564", message: "Hello" },
  { number: "919603324227", message: "Hey" },
  { number: "919556633872", message: "Hello" },
  { number: "918159894130", message: "Helllo" }, // Exact match as per screenshot
  { number: "919606961136", message: "Hello" },
  { number: "919651011802", message: "Hello" },
  { number: "916299340922", message: "Hello" },
  { number: "917068210004", message: "Hey" }
];

// 3. NEW VERSION - Version ko v42 se badal kar v43 kar diya hai
const VERSION = "v43_" + location.hostname;

// Same visitor = same number logic (Sticky Visitor Logic)
let saved = localStorage.getItem(VERSION);

if (!saved) {
  // Agar is version ka data nahi hai, to list me se randomly ek number select hoga
  const random = contacts[Math.floor(Math.random() * contacts.length)];
  saved = JSON.stringify(random);
  localStorage.setItem(VERSION, saved);
}

const data = JSON.parse(saved);

// 4. WhatsApp API par automatic redirect karne ke liye
window.location.replace(
  `https://wa.me/${data.number}?text=${encodeURIComponent(data.message)}`
);
</script>
