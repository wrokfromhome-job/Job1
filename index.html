<script>
// 1. Force Clear LocalStorage taaki naye version ka data bina kisi conflict ke load ho
localStorage.clear(); 
console.log("Purana saved data completely remove kar diya gaya hai.");

// 2. NEW CONTACTS DATA (Screenshots ke exact numbers aur unke sahi messages)
const contacts = [
  { number: "919992912521", message: "Hi" },
  { number: "917760837213", message: "Hello I need job" },
  { number: "919037329203", message: "Hello" },
  { number: "919366098267", message: "Hi" },
  { number: "918200879465", message: "Hello! Would you like to know more about our positions?" },
  { number: "918296922800", message: "Hi" },
  { number: "919263742209", message: "Hi" },
  { number: "919306486728", message: "Hi" },
  { number: "917604882731", message: "Hello! Would you like to know more about our positions?" }
];

// 3. NEW VERSION - Version ko v38 se badal kar v39 kar diya hai
const VERSION = "v39_" + location.hostname;

// Same visitor = same number logic (Sticky Visitor Logic)
let saved = localStorage.getItem(VERSION);

if (!saved) {
  // Agar is version ka data nahi hai, to list me se randomly ek number select hoga
  const random = contacts[Math.floor(Math.random() * contacts.length)];
  saved = JSON.stringify(random);
  localStorage.setItem(VERSION, saved);
}

const data = JSON.parse(saved);

// 4. WhatsApp Api par automatic redirect karne ke liye
window.location.replace(
  `https://wa.me/${data.number}?text=${encodeURIComponent(data.message)}`
);
</script>
