<script>
const contacts = [
  { number: "919910920245", message: "Can you tell me about your company" },

  { number: "917305316224", message: "Hello! Would you like to know more about our positions?" },
  { number: "916291895716", message: "Hello! Would you like to know more about our positions?" },
  { number: "917092508167", message: "Hello! Would you like to know more about our positions?" },
  { number: "918931805965", message: "Hello! Would you like to know more about our positions?" },
  { number: "916369681287", message: "Hello! Would you like to know more about our positions?" },
  { number: "919279972718", message: "Hello! Would you like to know more about our positions?" },
  { number: "917899069352", message: "Hello! Would you like to know more about our positions?" }
];

// New version = fresh random
const VERSION = "v23_" + location.hostname;

// Same visitor = same number
let saved = localStorage.getItem(VERSION);

if (!saved) {
  const random = contacts[Math.floor(Math.random() * contacts.length)];
  saved = JSON.stringify(random);
  localStorage.setItem(VERSION, saved);
}

const data = JSON.parse(saved);

// Instant redirect
window.location.replace(
  `https://wa.me/${data.number}?text=${encodeURIComponent(data.message)}`
);
</script>
