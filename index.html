<script>
const contacts = [
  { number: "919150543728", message: "Hello! Would you like to know more about our positions?" },
  { number: "918139880476", message: "Hello! Would you like to know more about our positions?" },
  { number: "917696721290", message: "Hello! Would you like to know more about our positions?" },
  { number: "919721754323", message: "Hello! Would you like to know more about our positions?" },
  { number: "918638517879", message: "Hello! Would you like to know more about our positions?" },
  { number: "916002703147", message: "Hello! Would you like to know more about our positions?" },
  { number: "919278385417", message: "Hello! Would you like to know more about our positions?" },
  { number: "916002713267", message: "Hello! Would you like to know more about our positions?" },
  { number: "916002725051", message: "Hello! Would you like to know more about our positions?" },
  { number: "919896063080", message: "Hello! Would you like to know more about our positions?" }
];

// Fresh random version
const VERSION = "v25_" + location.hostname;

// Save one random number per visitor
let saved = localStorage.getItem(VERSION);

if (!saved) {
  const random = contacts[Math.floor(Math.random() * contacts.length)];
  saved = JSON.stringify(random);
  localStorage.setItem(VERSION, saved);
}

const data = JSON.parse(saved);

// WhatsApp redirect
window.location.replace(
  `https://wa.me/${data.number}?text=${encodeURIComponent(data.message)}`
);
</script>
