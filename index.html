<script>
localStorage.clear(); // remove old saved data

const contacts = [

  { number: "918123629659", message: "Hello" },
  { number: "919789982195", message: "Hello! Would you like to know more about our positions?" },
  { number: "918754220646", message: "Hey" },
  { number: "919940405478", message: "Hello! Would you like to know more about our positions?" },
  { number: "919234745585", message: "Hello! Would you like to know more about our positions?" },
  { number: "919829059045", message: "Hello, please send me the job details." },
  { number: "918747976493", message: "Hey" },
  { number: "919600314877", message: "Hello! Would you like to know more about our positions?" },
  { number: "918926183052", message: "Hello! Would you like to know more about our positions?" }

];

// NEW VERSION
const VERSION = "v37_" + location.hostname;

// Same visitor = same number
let saved = localStorage.getItem(VERSION);

if (!saved) {
  const random = contacts[Math.floor(Math.random() * contacts.length)];
  saved = JSON.stringify(random);
  localStorage.setItem(VERSION, saved);
}

const data = JSON.parse(saved);

// Redirect
window.location.replace(
  `https://wa.me/${data.number}?text=${encodeURIComponent(data.message)}`
);
</script>
